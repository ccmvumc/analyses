---
containers:
  - name: ANALYSES
    path: ccmvumc_analyses_v2.1.sif
    source: docker://bud42/ccmvumc_analyses:v2.1
  - name: CONN
    path: all_conn_rsfc_v1.4.3.sif
    source: docker://bud42/all_conn_rsfc:v1.4.3
requirements:
  walltime: 0-12
  memory: 20G
inputs:
  xnat:
    subjects:
      assessors:
        - types: fmri_nback_CHAMP_v3
          resources:
            - resource: CONN
pre:
  type: singularity_exec
  container: ANALYSES
  args: bash /REPO/src/CONN/merge-pre-task.sh
command:
  type: singularity_exec
  container: CONN
  args: bash /REPO/src/CONN/merge-main-task.sh
post:
  type: singularity_exec
  container: ANALYSES
  args: bash /REPO/src/CHAMP-A008/merge-post-nback.sh
description: Project-level NBACK with CONN
