---
containers:
  - name: FS7
    path: fs7_post_v1.sif
    source: docker://bud42/fs7_post:v1
  - name: ANALYSES
    path: ccmvumc_analyses_v2.sif
    source: docker://bud42/ccmvumc_analyses:v2
requirements:
  walltime: 0-2
  memory: 8G
inputs:
  xnat:
    subjects:
      assessors:
        - types: FEOBVQA_v4
          resources:
          - resource: SUBJ
            fmatch: mri/orig.mgz,mri/gtmseg.mgz,gtmpvc.esupravwm.output/rbv.nii.gz,esupravwm.nii.gz
pre:
  type: singularity_exec
  container: ANALYSES
  args: /bin/bash /REPO/src/CHAMP-A023/pre.sh
command:
  type: singularity_exec
  container: FS7
  args: /bin/bash /REPO/src/CHAMP-A023/main.sh
  extraopts: -B $HOME/freesurfer_license.txt:/opt/freesurfer/.license
post:
  type: singularity_exec
  container: ANALYSES
  args: /bin/bash /REPO/src/CHAMP-A023/post.sh
description: Project-level FEOBVQA summary
